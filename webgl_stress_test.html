<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بيئة آمنة جداً UwU</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; }
        #phase1 {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffe4e1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        #start-btn {
            padding: 20px 40px; font-size: 24px; background: #ff6b9e;
            color: white; border: none; border-radius: 50px; cursor: pointer;
        }
        #stop-btn {
            position: fixed; top: 10px; right: 10px; padding: 10px;
            background: red; color: white; z-index: 200; display: none;
            border: none; border-radius: 5px; animation: pulse 0.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

<div id="phase1">
    <h1 style="color: #d14781;">🌸 أهلاً بك في المكان اللطيف 🌸</h1>
    <button id="start-btn">بدء التجربة</button>
</div>

<button id="stop-btn" onclick="location.reload()">STOP (RELOAD)</button>
<canvas id="canvas"></canvas>

<script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

    const btn = document.getElementById('start-btn');
    btn.onclick = () => {
        document.getElementById('phase1').style.display = 'none';
        document.getElementById('stop-btn').style.display = 'block';
        startStress();
    };

    function startStress() {
        const scene = new THREE.Scene();
        const camera = new THREE.Camera();
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: false });
        renderer.setPixelRatio(1); // الحفاظ على الثبات
        renderer.setSize(window.innerWidth, window.innerHeight);

        // هذا الـ Shader هو "قاتل الأداء" الحقيقي
        // يقوم بحساب معادلات Mandelbulb بشكل متكرر لكل بكسل
        const geometry = new THREE.PlaneGeometry(2, 2);
        const material = new THREE.ShaderMaterial({
            uniforms: { iTime: { value: 0 }, iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) } },
            vertexShader: `void main() { gl_Position = vec4(position, 1.0); }`,
            fragmentShader: `
                uniform float iTime;
                uniform vec2 iResolution;
                void main() {
                    vec2 uv = (gl_FragCoord.xy - 0.5 * iResolution.xy) / iResolution.y;
                    vec3 col = vec3(0.0);
                    vec3 ro = vec3(0.0, 0.0, 2.0);
                    vec3 rd = normalize(vec3(uv, -1.0));
                    float t = 0.0;
                    // حلقة تكرارية ثقيلة جداً (Raymarching)
                    // زيادة هذا الرقم سيجعل التعليق أقوى
                    for(int i=0; i<160; i++) {
                        vec3 p = ro + rd * t;
                        // معادلة تظليل معقدة ترهق الـ GPU
                        float d = length(p) - 0.5 + Math.sin(p.x*10.0 + iTime)*0.1;
                        d = min(d, length(p+vec3(sin(iTime), cos(iTime), 0.0)) - 0.2);
                        // إضافة طبقات حسابية لا يمكن اختصارها
                        for(int j=0; j<5; j++) {
                            p = abs(p) / dot(p,p) - 0.5;
                        }
                        d = min(d, length(p) - 0.02);
                        if(d < 0.001 || t > 10.0) break;
                        t += d * 0.5;
                    }
                    col = vec3(t * 0.1, 0.0, 0.0); // لون أحمر مرعب
                    gl_FragColor = vec4(col, 1.0);
                }
            `
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        function animate(time) {
            material.uniforms.iTime.value = time * 0.001;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    }
</script>
</body>
</html>
