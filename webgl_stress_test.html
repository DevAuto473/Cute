<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة اختبار إجهاد بطاقة الرسوميات والمعالج - محاكاة الرعب</title>
    <style>
        /* التنسيقات العامة */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            transition: background-color 0.1s;
        }

        /* ---------------- المرحلة 1: واجهة الخداع البريئة ---------------- */
        #phase1 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4e1 100%); /* وردي وأبيض كريمي */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: #d14781;
        }

        #phase1 h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(209, 71, 129, 0.2);
            text-align: center;
        }

        .emojis {
            font-size: 4rem;
            margin-bottom: 40px;
            letter-spacing: 15px;
        }

        #start-btn {
            background-color: #ff6b9e;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 20px 50px;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 107, 158, 0.4);
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
        }

        #start-btn:hover {
            background-color: #ff4785;
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(255, 107, 158, 0.6);
        }

        #start-btn:active {
            transform: scale(0.95);
        }

        /* ---------------- المرحلة 2: الجحيم المرعب ---------------- */
        #canvas-container {
            display: none;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* لوحة المقاييس الحية - أعلى اليسار */
        #metrics-panel {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            background-color: rgba(10, 0, 0, 0.9);
            border: 1px solid #ff0000;
            padding: 15px;
            border-radius: 8px;
            z-index: 10;
            pointer-events: none;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            min-width: 200px;
            text-align: left;
            direction: ltr;
        }

        .metric-title {
            font-size: 12px;
            color: #ff5555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 24px;
            font-weight: bold;
            color: #ff0000;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #ff0000;
        }

        .metric-value:last-child {
            margin-bottom: 0;
        }

        /* زر الإيقاف الثابت - أعلى اليمين (نابض ومرعب) */
        @keyframes throb {
            0% { transform: scale(1); box-shadow: 0 0 15px rgba(255, 0, 0, 0.8); background-color: #880000; }
            50% { transform: scale(1.15); box-shadow: 0 0 50px rgba(255, 0, 0, 1); background-color: #ff0000; }
            100% { transform: scale(1); box-shadow: 0 0 15px rgba(255, 0, 0, 0.8); background-color: #880000; }
        }

        #stop-btn {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            color: white;
            border: 3px solid #ff0000;
            padding: 15px 35px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            z-index: 100;
            animation: throb 0.4s infinite alternate cubic-bezier(0.68, -0.55, 0.27, 1.55);
            text-transform: uppercase;
            text-shadow: 0 0 5px #000;
        }

        #stop-btn:active {
            transform: scale(0.9);
        }

        /* شاشة النهاية */
        #end-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 200;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #fff;
        }

        #end-screen h1 {
            color: #00ff00;
            text-shadow: 0 0 20px #00ff00;
        }
    </style>
    
    <!-- استيراد مكتبة Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <!-- Shader لتشويه الرؤوس (Vertex Shader) -->
    <script type="x-shader/x-vertex" id="vertexShader">
        varying vec2 vUv;
        varying vec3 vPosition;
        uniform float time;

        void main() {
            vUv = uv;
            vPosition = position;
            
            // تشويه عنيف للرؤوس لإنشاء خلل بصري (Glitch)
            vec3 pos = position;
            pos.x += sin(time * 15.0 + position.y * 10.0) * 0.8;
            pos.y += cos(time * 20.0 + position.z * 10.0) * 0.8;
            pos.z += sin(time * 25.0 + position.x * 10.0) * 0.8;
            
            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        }
    </script>

    <!-- Shader مجنون وحساباته معقدة جداً (Fragment Shader) - خوارزمية فراكتال ثقيلة -->
    <script type="x-shader/x-fragment" id="fragmentShader">
        uniform float time;
        varying vec2 vUv;
        varying vec3 vPosition;

        // دالة الفراكتال المرعبة الثقيلة جداً لاستهلاك موارد بطاقة الرسوميات (GPU)
        float scaryFractal(vec3 p) {
            float d = 0.0;
            for(int i = 0; i < 10; i++) { // حلقة تكرار مكثفة
                p = abs(p) / dot(p, p) - vec3(0.5, 0.9, 0.4);
                d += length(p);
            }
            return d;
        }

        void main() {
            vec3 p = vPosition * 2.5 + vec3(time * 0.5);
            float f = scaryFractal(p);
            
            // لوحة ألوان الرعب (أحمر دموي، أسود، وأرجواني عميق)
            vec3 col = vec3(f * 0.04, f * 0.005, f * 0.015);
            
            // نبضات دموية مزعجة
            col += vec3(0.6, 0.0, 0.1) * sin(f * 15.0 - time * 10.0);
            
            // خلل بصري عنيف يعتمد على التردد العالي
            float glitch = step(0.95, fract(sin(dot(vUv.xy, vec2(12.9898, 78.233))) * 43758.5453 + time * 5.0));
            if (glitch > 0.5) {
                col.r += 1.5; // توهج أحمر حاد
                col.g *= 0.1;
                col.b += 0.3;
            }
            
            gl_FragColor = vec4(col, 1.0);
        }
    </script>

</head>
<body>

    <!-- المرحلة 1: الواجهة البريئة -->
    <div id="phase1">
        <div class="emojis">🌸✨🧸🎀</div>
        <h1>أهلاً بك في بيئتنا الآمنة جداً</h1>
        <button id="start-btn">بدء التجربة</button>
    </div>

    <!-- المرحلة 2: عناصر الكابوس -->
    <div id="canvas-container"></div>
    <div id="metrics-panel">
        <div class="metric-title">FPS</div>
        <div class="metric-value" id="fps-val">60</div> <!-- 60 قبل بدء الكارثة -->
        
        <div class="metric-title">Objects Rendered</div>
        <div class="metric-value" id="objects-val">0</div>
        
        <div class="metric-title">Resolution (Px Ratio x8)</div>
        <div class="metric-value" id="res-val">0 x 0</div>
    </div>
    <button id="stop-btn">STOP TEST</button>

    <div id="end-screen">
        <h1>تم إنقاذ الجهاز بنجاح!</h1>
        <p>تم تدمير الواجهة المرعبة وتحرير الذاكرة وتفريغ سياق WebGL بالكامل.</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { SSAOPass } from 'three/addons/postprocessing/SSAOPass.js';

        // المتغيرات
        let scene, camera, renderer, composer;
        let animationId;
        const objects = [];
        let scaryMaterial; // لحفظ الـ ShaderMaterial لتحديث الوقت
        const geometries = [];
        
        let lastTime = performance.now();
        let frames = 0;
        const fpsElement = document.getElementById('fps-val');
        const objectsElement = document.getElementById('objects-val');
        const resElement = document.getElementById('res-val');
        
        let isStopped = false;

        document.getElementById('start-btn').addEventListener('click', triggerHorrorPhase);
        document.getElementById('stop-btn').addEventListener('click', stopTest);

        function triggerHorrorPhase() {
            // تدمير الواجهة اللطيفة تماماً
            document.getElementById('phase1').style.display = 'none';
            document.body.style.backgroundColor = '#000';
            
            // إظهار الجحيم
            document.getElementById('canvas-container').style.display = 'block';
            document.getElementById('metrics-panel').style.display = 'block';
            document.getElementById('stop-btn').style.display = 'block';
            
            // بدء الإجهاد المدمر
            initDevastatingWebGL();
        }

        // تهيئة المشهد القاتل
        function initDevastatingWebGL() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050000, 0.03); // ضباب أسود ودموي

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 50;

            // إعدادات الـ Renderer لزيادة الضغط
            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            
            // مضاعفة البكسلات لـ 8 أضعاف (سيفيض بذاكرة GPU)
            const extremePixelRatio = window.devicePixelRatio * 8;
            renderer.setPixelRatio(extremePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            resElement.textContent = `${Math.floor(window.innerWidth * extremePixelRatio)} x ${Math.floor(window.innerHeight * extremePixelRatio)}`;

            // إعدادات المعالجة اللاحقة (Post-Processing) الكثيفة
            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));

            // SSAO يضاعف من استهلاك أداء الظلال المحيطية
            const ssaoPass = new SSAOPass(scene, camera, window.innerWidth, window.innerHeight);
            ssaoPass.kernelRadius = 32; // تأثير ضخم
            ssaoPass.minDistance = 0.001;
            ssaoPass.maxDistance = 0.2;
            composer.addPass(ssaoPass);

            // توهج مرعب للألوان الحمراء والبنفسجية (Bloom)
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 3.5, 0.8, 0.0);
            composer.addPass(bloomPass);

            // بناء الكارثة
            createNightmareGeometry();

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        // إنشاء المادة القاتلة والمجسمات العشوائية
        function createNightmareGeometry() {
            const numObjects = 25000; // عاصفة ضخمة من المجسمات المنفصلة
            objectsElement.textContent = numObjects.toLocaleString();

            const baseGeometry = new THREE.IcosahedronGeometry(1.5, 2);
            geometries.push(baseGeometry);

            // إنشاء ShaderMaterial المكلفة جداً
            scaryMaterial = new THREE.ShaderMaterial({
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                uniforms: {
                    time: { value: 0.0 }
                },
                wireframe: false,
                side: THREE.DoubleSide // تزيد التكلفة لأنها ترسم الجهتين
            });

            // إضافة عشرات الآلاف من المجسمات
            for (let i = 0; i < numObjects; i++) {
                const mesh = new THREE.Mesh(baseGeometry, scaryMaterial);
                
                // توزيع عشوائي متداخل جداً
                mesh.position.set(
                    (Math.random() - 0.5) * 150,
                    (Math.random() - 0.5) * 150,
                    (Math.random() - 0.5) * 150
                );
                
                mesh.rotation.set(
                    Math.random() * Math.PI,
                    Math.random() * Math.PI,
                    Math.random() * Math.PI
                );

                const scale = Math.random() * 2.0 + 0.5;
                mesh.scale.set(scale, scale, scale);

                mesh.userData = {
                    rx: (Math.random() - 0.5) * 0.05,
                    ry: (Math.random() - 0.5) * 0.05
                };

                scene.add(mesh);
                objects.push(mesh);
            }
        }

        // عملية حسابية معقدة لخنق الـ CPU بالكامل وإسقاط الإطارات لمنزلة الآحاد
        function brutalCPUChoking() {
            let garbageValue = 0;
            // حلقة ثقيلة لحساب الأعداد الأولية (أكثر من 8000 عدد)
            for (let i = 2; i < 8000; i++) {
                let isPrime = true;
                for (let j = 2; j <= Math.sqrt(i); j++) {
                    if (i % j === 0) {
                        isPrime = false;
                        break;
                    }
                }
                if (isPrime) garbageValue += i;
            }
            return garbageValue; // لمنع المترجم من تجاهل الدالة
        }

        // حلقة الجحيم
        function animate() {
            if (isStopped) return;

            animationId = requestAnimationFrame(animate);

            // 1. خنق المعالج (CPU Lag Spike)
            brutalCPUChoking();

            const time = performance.now() * 0.001;
            
            // تحديث وقت الـ Shader ليتحرك الفراكتال
            if (scaryMaterial) {
                scaryMaterial.uniforms.time.value = time;
            }

            // تحريك المجسمات لزيادة تحديثات المصفوفات
            for (let i = 0; i < objects.length; i++) {
                const obj = objects[i];
                obj.rotation.x += obj.userData.rx;
                obj.rotation.y += obj.userData.ry;
            }

            // كاميرا تهتز بخفة لمحاكاة الرعب
            camera.position.x = Math.sin(time * 0.5) * 60 + (Math.random() - 0.5) * 2;
            camera.position.y = Math.cos(time * 0.3) * 30 + (Math.random() - 0.5) * 2;
            camera.position.z = Math.cos(time * 0.5) * 60 + (Math.random() - 0.5) * 2;
            camera.lookAt(scene.position);

            // تحديث مقياس FPS ليرى المستخدم الهبوط الحاد
            frames++;
            if (time * 1000 >= lastTime + 1000) {
                fpsElement.textContent = Math.round((frames * 1000) / (time * 1000 - lastTime));
                frames = 0;
                lastTime = time * 1000;
            }

            // التصيير مع ضغط الـ Shader والـ Post-Processing والـ Pixel Ratio
            composer.render();
        }

        function onWindowResize() {
            if (isStopped || !camera) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            
            const extremePixelRatio = window.devicePixelRatio * 8;
            resElement.textContent = `${Math.floor(window.innerWidth * extremePixelRatio)} x ${Math.floor(window.innerHeight * extremePixelRatio)}`;
        }

        // الإيقاف الطارئ والإنقاذ (Rescue Function)
        function stopTest() {
            isStopped = true;
            
            // إيقاف الحلقة فوراً
            if (animationId) {
                cancelAnimationFrame(animationId);
            }

            // إزالة الكائنات والتخلص من المواد، الشيدرات، والهندسات
            for (let i = objects.length - 1; i >= 0; i--) {
                const obj = objects[i];
                scene.remove(obj);
            }
            
            geometries.forEach(geo => geo.dispose());
            if (scaryMaterial) scaryMaterial.dispose();
            
            // تدمير سياق WebGL بالكامل لإنقاذ الذاكرة
            if (renderer) {
                renderer.dispose();
                renderer.forceContextLoss(); // إجبار التخلص من سياق الرسوميات
                const container = document.getElementById('canvas-container');
                if (container.contains(renderer.domElement)) {
                    container.removeChild(renderer.domElement);
                }
            }
            
            if (composer) {
                composer.dispose();
            }

            // إخفاء الأدوات وإظهار شاشة الإنقاذ
            document.getElementById('canvas-container').style.display = 'none';
            document.getElementById('metrics-panel').style.display = 'none';
            document.getElementById('stop-btn').style.display = 'none';
            
            document.getElementById('end-screen').style.display = 'flex';
        }
    </script>
</body>
</html>
