<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بيئة آمنة جداً 🎀</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #fff; font-family: sans-serif; }
        #phase1 {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffe4e1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        #start-btn {
            padding: 20px 40px; font-size: 24px; background: #ff6b9e;
            color: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        #stop-btn {
            position: fixed; top: 10px; right: 10px; padding: 15px;
            background: red; color: white; z-index: 200; display: none;
            border-radius: 10px; font-weight: bold; border: 2px solid white;
        }
        #metrics { position: fixed; top: 10px; left: 10px; color: red; z-index: 50; display: none; font-family: monospace; font-weight: bold; }
        canvas { display: block; width: 100vw; height: 100vh; background: black; }
    </style>
</head>
<body>

<div id="phase1">
    <div style="font-size: 4rem;">🌸🎀🍭</div>
    <h1 style="color: #d14781;">أهلاً بك في عالم الهدوء</h1>
    <button id="start-btn">بدء التجربة</button>
</div>

<div id="metrics">FPS: <span id="fps-val">60</span></div>
<button id="stop-btn" onclick="location.reload()">STOP TEST (RELOAD)</button>
<canvas id="canvas"></canvas>

<script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

    const startBtn = document.getElementById('start-btn');
    startBtn.onclick = () => {
        document.getElementById('phase1').style.display = 'none';
        document.getElementById('stop-btn').style.display = 'block';
        document.getElementById('metrics').style.display = 'block';
        initExtremeLag();
    };

    function initExtremeLag() {
        const canvas = document.getElementById('canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        // إنشاء "نسيج" (Texture) ضخم جداً لتوليد زحمة بيانات
        const size = 1024; // دقة النسيج
        const data = new Uint8Array(size * size * 4);
        const texture = new THREE.DataTexture(data, size, size, THREE.RGBAFormat);

        const material = new THREE.ShaderMaterial({
            uniforms: { 
                u_texture: { value: texture },
                u_time: { value: 0 }
            },
            vertexShader: `void main() { gl_Position = vec4(position, 1.0); }`,
            fragmentShader: `
                uniform sampler2D u_texture;
                uniform float u_time;
                void main() {
                    vec2 uv = gl_FragCoord.xy / 100.0;
                    vec4 tex = texture2D(u_texture, uv);
                    // معادلة مرعبة ترهق كرت الشاشة مع البيانات القادمة من المعالج
                    float res = 0.0;
                    for(int i=0; i<200; i++) {
                        res += sin(uv.x * float(i) + u_time) * cos(uv.y * float(i));
                    }
                    gl_FragColor = vec4(res * tex.r, 0.0, 0.0, 1.0); 
                }
            `
        });

        const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
        scene.add(mesh);

        let lastTime = performance.now();
        let frames = 0;

        function animate(time) {
            // الضربة القاضية: تحديث بيانات ضخمة في كل إطار (CPU to GPU saturated)
            for (let i = 0; i < data.length; i++) {
                data[i] = Math.random() * 255; 
            }
            texture.needsUpdate = true;
            material.uniforms.u_time.value = time * 0.001;

            renderer.render(scene, camera);

            // حساب الـ FPS
            frames++;
            const now = performance.now();
            if (now >= lastTime + 1000) {
                document.getElementById('fps-val').innerText = frames;
                frames = 0;
                lastTime = now;
            }

            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    }
</script>
</body>
</html>
